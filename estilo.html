<body>
    <h1>formulario de estilo e esporte</h1>
<p>responda para ajudar no mapeamento e tendencias urbanas</p>

    <div>
<h2>Formulario de cadastro de tendencias</h2>
<form oninput="resultadoNota. value= notaEstilo.value">
    <p>
    <label for="nome">Nome Completo</label>
    <input type="text" id="nome" name="nome"placeholder="ex.mc pipinho">
    </p>
    <p>
    <label for="email">E-mail</label><br>
    <input type="email" id="email"name="email"placeholder=nome@provedor.com>
    </p>
    <label for="data-nasc">Data de nascimento:</label><br>
    <input type="date" id="data-nasc"name="data-nacs>"
    <p>
        <label>quais esportes e lazer voce pratica?(Marque quantos quiser)</label><br>
        <input type="checkbox"id="esp1" name="esportes" value="Futebol">
        <label for="esp1">Futebol de campo/ quadra</label><br>
         <input type="checkbox"id="esp2" name="esportes" value="Skate">
        <label for="esp2">Skate/Patins</label><br>
         <input type="checkbox"id="esp3" name="esportes" value="Volei">
        <label for="esp3">Volei</label><br>
         <input type="checkbox"id="esp4" name="esportes" value="Basquete">
        <label for="esp4">Basquete</label><br>
        <input type="checkbox"id="esp5" name="esportes" value="Dança">
        <label for="esp5">Dança</label><br>
        <input type="checkbox"id="esp6" name="esportes" value="Ginastica">
        <label for="esp6">Ginástica</label><br>
    </p>
    <label for="marca">Qual marca de roupa você prefere?</label><br>
    <input list="marca"id="marca" name="marca" placeholder="Digite ou selecione...">
    <datalist id="marca">
        <option value="Nike">
        <option value="Adidas">
        <option value="Vans">
        <option value="Puma">
        </datalist>

        <p>
            <label for="instituiçao">Onde voce foca os seus estudos atualmete?</label><br>
            <select id="instituiçao">
                <option value="">Selecione...</option>
                <option value="Universidade">Universidade</option>
                <option value="Faculdade">Faculdade</option>
                <option value="Escola">Escola</option>
            </select>
        </p>

        
    </div>
</body>
